# CORAL v4.2 — Phase 4a: Amortisation with crystallisation
# Goal: test whether amortisation loss (encouraging the backbone to match the
# crystallised codebook output directly) improves inference efficiency when
# combined with multi-headed crystallisation.
# Lambda_amort linearly ramps from 0 → 0.01 over steps 2000–8000.

model:
  # Single level: d=512
  n_levels: 1
  level_dims: [512]

  # Backbone
  backbone_layers: 2
  backbone_dim: 512
  n_heads: 8
  d_k: 64
  ffn_expansion: 4

  # Timescale: T=3 inner steps per segment
  timescale_base: 3

  # Predictive coding — OFF (crystallisation-first research order)
  use_predictive_coding: false
  lambda_pred: 0.001
  lambda_pi: 0.001   # deprecated in v4.2, kept for compat
  epsilon_min: 0.01

  # Halting
  K_max: 16
  halting_threshold: 0.95
  halting_exploration_prob: 0.1
  halting_gamma: 0.9

  # v4.2 mode flag
  mode: "full"

  # Crystallisation — multi-headed (same as phase 3b)
  use_crystallisation: true
  codebook_heads: 8
  codebook_entries_per_head: 32
  tau_converge: 0.01
  tau_decrystallise: 0.05
  n_stable: 2
  lambda_commit: 0.25
  lambda_dis: 0.01
  lambda_crystal: 0.0

  # Amortisation — active in phase 4
  use_amort: true
  lambda_amort: 0.01   # target value after annealing completes

  # Other components
  use_column_heads: false
  use_stochastic: false

  # Precision
  precision_momentum: 0.99

  # Attention bias
  use_local_attention_bias: true

  # Adapter
  vocab_size: 11

training:
  epochs: 20000
  batch_size: 64
  learning_rate: 7e-5
  weight_decay: 1.0
  betas: [0.9, 0.95]
  gradient_clip: 1.0
  scheduler: cosine
  warmup_steps: 500

  # Mixed precision
  precision: bfloat16
  loss_precision: float64

  full_inner_backprop: true

  # Evaluation
  eval_every: 500
  pareto_eval_every: 5000
  quick_eval_samples: 100
  log_every: 50

  optimizer: adamw

  compile_model: false
  compile_dynamic: false

  # Codebook initialisation from Phase 3 collected states (optional)
  codebook_init_from: null

  # Amortisation annealing: ramp lambda_amort from 0 → 0.01 over steps 2000–8000
  amort_anneal_start: 2000
  amort_anneal_end: 8000

data:
  dataset: sudoku_extreme_1k
  dataset_path: data/sudoku_extreme_1k
  augmentation_factor: 1000
  eval_size: 1000
  num_workers: 4
  seq_len: 81

wandb:
  project: "Sudoku-extreme-1k-aug-1000 CORAL-v4"
  entity: aktuator-ai
  run_name: v4.2-phase4a-amort-with-crystal
  tags: ["v4.2", "phase4a", "full", "crystallisation", "amortisation", "annealing"]
  log_every: 50
  disabled: false

seed: 42
device: cuda
experiment_name: phase4_amort_with_crystal
