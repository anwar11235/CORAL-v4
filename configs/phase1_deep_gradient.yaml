# CORAL v4.2 — Phase 1 Deep Gradient Experiment
#
# Hypothesis #1 from plateau_audit.md: the 32× gradient depth gap vs TRM is the
# primary cause of the 56% token accuracy plateau.
#
# Key change: K_max=1 (single segment) + inner_steps_override=336
#   - Same total backbone applications as baseline: 336 = 21 × 16
#   - Effective gradient depth: 336 (vs 21 in baseline) — all in ONE computation graph
#   - No detach between segments (there is only one)
#   - Equivalent to TRM's 2-layer backbone × 336 inner steps = 672 transformer layer applications
#
# Decision rule:
#   - If token_accuracy > 70% at step 2000 → gradient depth is the primary bottleneck
#   - If token_accuracy ≈ 56% → gradient depth is NOT the cause; move to Experiment 2/3
#
# Memory note: 336 in-graph steps requires ~5–8 GB for activations at bfloat16.
#   batch_size reduced from 64 → 32 to stay within 24 GB VRAM.
#   Effective gradient steps per epoch are halved; consider running for 40000 steps.

model:
  # Single level: d=512, no hierarchy
  n_levels: 1
  level_dims: [512]

  # Backbone
  backbone_layers: 2
  backbone_dim: 512
  n_heads: 8
  d_k: 64
  ffn_expansion: 4

  # Timescale: K_max=1 segment, 336 inner steps — all in ONE computation graph.
  # Total backbone applications: 336 (same compute as baseline 21 × 16).
  # Effective gradient depth: 336 (vs 21 in baseline).
  timescale_base: 3
  inner_steps_override: 336
  K_max: 1

  # Predictive coding — OFF
  use_predictive_coding: false
  lambda_pred: 0.001
  lambda_pi: 0.001   # deprecated in v4.2, kept for compat
  epsilon_min: 0.01

  # Halting: with K_max=1 the halting network always halts after 1 segment.
  # The halt loss is still computed (L_halt = 0.5 × BCE) but provides no useful
  # adaptive depth signal. Threshold set low so it never triggers early.
  halting_threshold: 0.95
  halting_exploration_prob: 0.0  # no exploration — always run the single segment
  halting_gamma: 0.9

  # v4.2 mode flag
  mode: "baseline"

  # Components disabled
  use_crystallisation: false
  use_column_heads: false
  use_stochastic: false
  use_amort: false
  lambda_amort: 0.0
  lambda_crystal: 0.0
  lambda_commit: 0.25

  # v4.2 codebook / crystallisation (unused in baseline, kept for schema compat)
  codebook_heads: 8
  codebook_entries_per_head: 32
  tau_converge: 0.01
  tau_decrystallise: 0.05
  n_stable: 2
  lambda_dis: 0.01
  precision_momentum: 0.99
  use_local_attention_bias: true

  # Adapter
  vocab_size: 11

training:
  # Run for 40000 steps to compensate for halved batch size (B=32 vs 64).
  # Effective data volume per step is identical to baseline (32 samples × 2 = 64).
  epochs: 40000
  batch_size: 32
  learning_rate: 7e-5
  weight_decay: 1.0
  betas: [0.9, 0.95]
  gradient_clip: 1.0
  scheduler: cosine
  warmup_steps: 500

  # Mixed precision
  precision: bfloat16
  loss_precision: float64

  full_inner_backprop: true

  # Evaluation
  eval_every: 500
  pareto_eval_every: 5000
  quick_eval_samples: 100
  log_every: 50

  optimizer: adamw

  compile_model: false
  compile_dynamic: false

  # Single segment: weighting is irrelevant (only one loss term). Keep "uniform".
  deep_supervision_weighting: "uniform"

data:
  dataset: sudoku_extreme_1k
  dataset_path: data/sudoku_extreme_1k
  augmentation_factor: 1000
  eval_size: 1000
  num_workers: 4
  seq_len: 81

wandb:
  project: "Sudoku-extreme-1k-aug-1000 CORAL-v4"
  entity: aktuator-ai
  run_name: v4.2-phase1-deep-gradient-K1-T336
  tags: ["v4.2", "phase1", "baseline", "no-pc", "deep-gradient", "K1", "T336"]
  log_every: 50
  disabled: false

seed: 42
device: cuda
experiment_name: phase1_deep_gradient
