# CORAL v4 — Experiment 1: Shared Backbone + Full Backprop + Predictive Coding
# Goal: Reproduce and exceed Phase 1 results (61.1%) with new architecture.
# Target: >= 70% exact accuracy on Sudoku-Extreme-1K.

model:
  # Hierarchy
  n_levels: 2
  level_dims: [512, 256]

  # Backbone
  backbone_layers: 2
  backbone_dim: 512
  n_heads: 8
  d_k: 64
  ffn_expansion: 4

  # Timescale: T=3 → level 0 gets 3 steps, level 1 gets 1 step per segment
  timescale_base: 3

  # Predictive coding (ON for Exp 1)
  use_predictive_coding: true
  lambda_pred: 0.1
  lambda_pi: 0.01
  epsilon_min: 0.01

  # Halting
  K_max: 16
  halting_threshold: 0.95
  halting_exploration_prob: 0.1
  halting_gamma: 0.9

  # Components disabled for Experiment 1
  use_crystallisation: false
  use_column_heads: false
  use_stochastic: false
  use_amort: false
  lambda_amort: 0.0
  lambda_crystal: 0.0
  lambda_commit: 0.0

  # Adapter
  vocab_size: 10

training:
  epochs: 20000
  batch_size: 64
  learning_rate: 7e-5
  weight_decay: 1.0
  betas: [0.9, 0.95]
  gradient_clip: 1.0
  scheduler: cosine
  warmup_steps: 500

  # Mixed precision
  precision: bfloat16
  loss_precision: float64

  # Full backprop within segment — KEY change from v3
  full_inner_backprop: true

  # Evaluation
  eval_every: 500
  log_every: 50

  # Optimizer: try fused_adam_atan2 first, fall back to adamw
  optimizer: adamw

  # torch.compile: use dynamic=False for fixed L=81
  compile_model: false
  compile_dynamic: false

data:
  dataset: sudoku_extreme_1k
  dataset_path: data/sudoku_extreme_1k
  augmentation_factor: 1000
  eval_size: 1000
  num_workers: 1
  seq_len: 81

wandb:
  project: "Sudoku-extreme-1k-aug-1000 CORAL-v4"
  entity: aktuator-ai
  run_name: v4-exp1-baseline
  tags: ["v4", "exp1", "shared-backbone", "full-backprop", "predictive-coding"]
  log_every: 50
  disabled: false

seed: 42
device: cuda
experiment_name: exp1_baseline
