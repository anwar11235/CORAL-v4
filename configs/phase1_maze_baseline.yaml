# CORAL v4.2 — Phase 1: Maze-Hard baseline (Session A smoke test)
# Goal: verify CORAL runs on Maze-Hard 30x30 without errors.
# Mode: "baseline" — no PC, no crystallisation, single level.
# Metrics: exact_accuracy (primary), path_accuracy (label==5), wall_accuracy (label==2)

model:
  # Single level
  n_levels: 1
  level_dims: [512]

  # Backbone
  backbone_layers: 2
  backbone_dim: 512
  n_heads: 8
  d_k: 64
  ffn_expansion: 4

  timescale_base: 3
  # Session A smoke test: small inner steps to fit 900-len sequences in memory.
  # Scale up in Session B (e.g. inner_steps_override=21).
  inner_steps_override: 6

  # Predictive coding — OFF
  use_predictive_coding: false
  lambda_pred: 0.001
  lambda_pi: 0.001
  epsilon_min: 0.01

  # Halting — small K_max for smoke test
  K_max: 4
  halting_threshold: 0.95
  halting_exploration_prob: 0.1
  halting_gamma: 0.9

  # v4.2 mode
  mode: "baseline"

  # Components disabled
  use_crystallisation: false
  use_column_heads: false
  use_stochastic: false
  use_amort: false
  lambda_amort: 0.0
  lambda_crystal: 0.0
  lambda_commit: 0.25

  # v4.2 codebook / crystallisation (unused, kept for schema compat)
  codebook_heads: 8
  codebook_entries_per_head: 32
  tau_converge: 0.01
  tau_decrystallise: 0.05
  n_stable: 2
  lambda_dis: 0.0
  precision_momentum: 0.99

  # Maze has no row/col/box structure — disable attention bias
  use_local_attention_bias: false

  # Adapter
  vocab_size: 6   # maze: pad=0, path=1, wall=2, start=3, goal=4, optimal_path=5
  embed_scale: true
  use_consolidation_step: false

  # Partial gradient inner loop
  grad_inner_steps: 2

  # Learned z_init
  use_learned_z_init: false
  learned_z_init_seq_len: 900

training:
  epochs: 2000
  batch_size: 16
  learning_rate: 7e-5
  weight_decay: 1.0
  betas: [0.9, 0.95]
  gradient_clip: 1.0
  scheduler: cosine
  warmup_steps: 100

  precision: bfloat16
  loss_precision: float64

  full_inner_backprop: true

  eval_every: 200
  pareto_eval_every: 999999
  quick_eval_samples: 200
  log_every: 20

  optimizer: adamw

  compile_model: false
  compile_dynamic: false

  deep_supervision_weighting: "uniform"

data:
  dataset: "maze_30x30_hard"
  dataset_path: "data/maze-30x30-hard-1k"
  augmentation_factor: 1
  eval_size: 1000
  num_workers: 1
  seq_len: 900
  grid_height: 30
  grid_width: 30

wandb:
  project: "CORAL-v4-maze"
  entity: "aktuator-ai"
  run_name: "v4.2-maze-session-A-smoke"
  tags: ["v4.2", "maze", "session-A", "smoke-test"]
  log_every: 50
  disabled: false

seed: 42
device: cuda
experiment_name: phase1_maze_baseline
