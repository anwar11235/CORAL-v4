# CORAL v4.2 — Phase 1: N=2 Baseline, Deep (inner_steps_override=18)
# Same as phase1_baseline_n2.yaml but with inner_steps_override=18 to match
# TRM's effective depth (3 H-cycles × 6 L-cycles = 18 inner passes per segment).
#
# Level 0 (d=512, fast):  18 inner steps per segment (override)
# Level 1 (d=256, slow):   1 inner step per segment (timescale formula, unchanged)
#
# Total backbone applications: (18+1) × 16 segments = 304 per forward pass.
# Compare: TRM-attention achieves ~75% with 18 L-cycle passes per segment.

model:
  # Two-level hierarchy
  n_levels: 2
  level_dims: [512, 256]

  # Backbone (shared across all levels and steps)
  backbone_layers: 2
  backbone_dim: 512
  n_heads: 8
  d_k: 64
  ffn_expansion: 4

  # inner_steps_override applies only to level 0; level 1 still gets T^0=1 step
  timescale_base: 3
  inner_steps_override: 18   # level 0: 18 steps; level 1: 1 step

  # Predictive coding — OFF in baseline mode
  use_predictive_coding: false
  lambda_pred: 0.001
  lambda_pi: 0.001   # deprecated in v4.2, kept for compat
  epsilon_min: 0.01

  # Halting
  K_max: 16
  halting_threshold: 0.95
  halting_exploration_prob: 0.1
  halting_gamma: 0.9

  # v4.2 mode flag
  mode: "baseline"

  # Components disabled
  use_crystallisation: false
  use_column_heads: false
  use_stochastic: false
  use_amort: false
  lambda_amort: 0.0
  lambda_crystal: 0.0
  lambda_commit: 0.25

  # v4.2 codebook / crystallisation (unused in baseline, kept for schema compat)
  codebook_heads: 8
  codebook_entries_per_head: 32
  tau_converge: 0.01
  tau_decrystallise: 0.05
  n_stable: 2
  lambda_dis: 0.01
  precision_momentum: 0.99
  use_local_attention_bias: true

  # Adapter
  vocab_size: 11
  embed_scale: true  # scale input embeddings by sqrt(d_model)

training:
  epochs: 20000
  batch_size: 128
  learning_rate: 1e-4
  weight_decay: 1.0
  betas: [0.9, 0.95]
  gradient_clip: 1.0
  scheduler: cosine
  warmup_steps: 2000

  # Mixed precision
  precision: bfloat16
  loss_precision: float64

  full_inner_backprop: true

  # Evaluation
  eval_every: 500
  pareto_eval_every: 999999    # disable Pareto eval
  quick_eval_samples: 100
  log_every: 50

  optimizer: adamw

  compile_model: false
  compile_dynamic: false

  deep_supervision_weighting: "linear"

data:
  dataset: sudoku_extreme_1k
  dataset_path: data/sudoku_extreme_1k
  augmentation_factor: 1000
  eval_size: 1000
  num_workers: 4
  seq_len: 81

wandb:
  project: "Sudoku-extreme-1k-aug-1000 CORAL-v4"
  entity: aktuator-ai
  run_name: v4.2-phase1-n2-deep
  tags: ["v4.2", "phase1", "baseline", "no-pc", "n2", "deep"]
  log_every: 50
  disabled: false

seed: 42
device: cuda
experiment_name: phase1_baseline_n2_deep
