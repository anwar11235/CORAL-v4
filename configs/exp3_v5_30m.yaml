# CORAL v5 — Experiment 3: gate-only conditioning at 30M parameters (Phase 2)
# Goal: Wire v5 feature-selective ConditioningGate into CORAL. Replace v4's
#   scalar cond_gate with per-feature MLP gate at both hierarchy levels.
#   Gate starts mostly closed (sigmoid(-2) ~ 0.12); learns to open per-feature.
#   Precision regulariser reintroduced in loss path (removed in v4.2).
#   Single variable change from exp2: conditioning primitive only.

model:
  # Hierarchy
  n_levels: 2
  level_dims: [768, 384]

  # Backbone
  backbone_layers: 3
  backbone_dim: 768
  n_heads: 8
  d_k: 64
  ffn_expansion: 4

  # Timescale: T=3 -> level 0 gets 3 steps, level 1 gets 1 step per segment
  timescale_base: 3

  # Predictive coding (ON for Exp 3)
  use_predictive_coding: true
  lambda_pred: 0.001
  lambda_pi: 0.001
  epsilon_min: 0.01

  # Halting
  K_max: 16
  halting_threshold: 0.95
  halting_exploration_prob: 0.1
  halting_gamma: 0.9

  # Components disabled for Experiment 3
  use_crystallisation: false
  use_column_heads: false
  use_stochastic: false
  use_amort: false
  lambda_amort: 0.0
  lambda_crystal: 0.0
  lambda_commit: 0.0

  # Adapter
  vocab_size: 11

  # v5 ConditioningGate (gate-only, no precision in conditioning path)
  gate_hidden_dim: 0        # 0 = use each level's own d_model as hidden width
  gate_init_bias: -2.0      # sigmoid(-2) ~ 0.12: gate starts mostly closed

training:
  epochs: 20000
  batch_size: 64
  learning_rate: 7e-5
  weight_decay: 1.0
  betas: [0.9, 0.95]
  gradient_clip: 1.0
  scheduler: cosine
  warmup_steps: 500

  # Mixed precision
  precision: bfloat16
  loss_precision: float64

  # Full backprop within segment
  full_inner_backprop: true

  # Evaluation
  eval_every: 500          # quick eval: first quick_eval_samples puzzles, full K_max
  pareto_eval_every: 5000  # full Pareto eval: all puzzles, K=1,2,4,8,16
  quick_eval_samples: 100
  log_every: 50

  # Optimizer
  optimizer: adamw

  compile_model: false
  compile_dynamic: false

data:
  dataset: sudoku_extreme_1k
  dataset_path: data/sudoku_extreme_1k
  augmentation_factor: 1000
  eval_size: 1000
  num_workers: 4
  seq_len: 81

wandb:
  project: "Sudoku-extreme-1k-aug-1000 CORAL-v4"
  entity: aktuator-ai
  run_name: v5-exp3-gate-only-30m
  tags: ["v5", "exp3", "30m", "gate-only", "phase2"]
  log_every: 50
  disabled: false

seed: 42
device: cuda
experiment_name: exp3_v5_30m
